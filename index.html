<script>

// ============================================================
// CONFIG
// ============================================================

const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxC92gLrinxS72t2r7e0nNGjAKbsicw9sR5vYaLcEzC0meuvCPncwmhFAthvvP3QtDHjw/exec';
const RAZORPAY_KEY_ID = 'rzp_live_SGoMjcZYfpwxeX';

let isEditMode = false;
let currentEmail = null;
let currentToken = null;

console.log('🚀 App loaded | Razorpay:', typeof Razorpay !== 'undefined' ? '✅' : '❌');


// ============================================================
// INIT
// ============================================================

window.addEventListener('load', async () => {

    const params = new URLSearchParams(window.location.search);
    const email = params.get('email');
    const token = params.get('token');

    if (email && token) {
        await initEditMode(email, token);
    }

});


// ============================================================
// EDIT MODE INIT
// ============================================================

async function initEditMode(email, token) {

    isEditMode = true;
    currentEmail = email;
    currentToken = token;

    document.getElementById('normalHeader').style.display = 'none';
    document.getElementById('editModeHeader').style.display = 'block';
    document.getElementById('formTitle').textContent = 'Edit Details';
    document.getElementById('submitBtn').textContent = '✏️ Update Card';
    document.getElementById('imageUploadSection').style.display = 'block';

    const ef = document.getElementById('emailField');
    ef.value = email;
    ef.disabled = true;

    try {

        const r = await fetch(`${WEB_APP_URL}?mode=fetch&email=${encodeURIComponent(email)}`);
        const data = await r.json();

        Object.keys(data).forEach(k => {

            const input = document.querySelector(`[name="${k}"]`);
            if (input && data[k]) input.value = data[k];

        });

        if (data.phone) prefillPhone(data.phone, 'phoneCC', 'phoneNumber');
        if (data.whatsapp) prefillPhone(data.whatsapp, 'whatsappCC', 'whatsappNumber');
        if (data.contact2Phone) prefillPhone(data.contact2Phone, 'contact2PhoneCC', 'contact2PhoneNumber');

    } catch (e) {

        console.error('Prefill error', e);
        alert('Error loading data');

    }

}


// ============================================================
// FORM SUBMIT
// ============================================================

document.getElementById('orderForm').addEventListener('submit', async function (e) {

    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    const originalText = btn.textContent;

    try {

        if (isEditMode) {

            await handleEdit(btn);

        } else {

            await handleNewOrder(btn, originalText);

        }

    } catch (err) {

        console.error(err);
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = originalText;

    }

});


// ============================================================
// NEW ORDER FLOW
// ============================================================

async function handleNewOrder(btn, originalText) {

    const fd = new FormData(document.getElementById('orderForm'));
    const data = {};

    fd.forEach((v, k) => data[k] = v);

    const phoneDigits = getFullPhone('phoneCC', 'phoneNumber');
    const waDigits = getFullPhone('whatsappCC', 'whatsappNumber');

    data.phone = phoneDigits;
    data.whatsapp = waDigits || phoneDigits;

    if (!data.fullName || !data.email || !data.phone) {
        alert('Name, Email, Phone required');
        return;
    }

    delete data.phoneCC;
    delete data.phoneNumber;
    delete data.whatsappCC;
    delete data.whatsappNumber;

    const c2Phone = getFullPhone('contact2PhoneCC', 'contact2PhoneNumber');
    if (c2Phone) data.contact2Phone = c2Phone;

    delete data.contact2PhoneCC;
    delete data.contact2PhoneNumber;

    btn.disabled = true;
    btn.textContent = '⏳ Creating order...';

    console.log('📤 Sending create order');

    const r = await fetch(WEB_APP_URL, {

        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
            mode: 'create',
            ...data
        })

    });

    const res = await r.json();

    console.log('📦 Order response:', res);

    if (res.status !== 'success') {

        throw new Error(res.message || 'Order creation failed');

    }

    const razorpayOrderId =
        res.razorpay_order_id ||
        res.razorpayOrderId ||
        res.order_id ||
        res.orderId;

    if (!razorpayOrderId) {

        console.error("❌ Missing Razorpay order id", res);
        throw new Error("Payment initialization failed — order id missing");

    }

    btn.textContent = '💳 Opening payment...';

    await new Promise(r => setTimeout(r, 400));

    openRazorpay(razorpayOrderId, res.amount, data, btn, originalText, res.orderId);

}


// ============================================================
// OPEN RAZORPAY
// ============================================================

function openRazorpay(orderId, amount, data, btn, originalText, internalOrderId) {

    if (typeof Razorpay === 'undefined') {

        alert('Payment SDK failed to load');
        btn.disabled = false;
        btn.textContent = originalText;
        return;

    }

    console.log('🚀 Opening Razorpay with order:', orderId);

    const rzp = new Razorpay({

        key: RAZORPAY_KEY_ID,
        order_id: orderId,
        amount: amount,
        currency: 'INR',

        name: 'Agrawal Futurify AI Solutions',
        description: 'Digital Visiting Card',

        prefill: {
            name: data.fullName,
            email: data.email,
            contact: data.phone.slice(-10)
        },

        notes: {
            internalOrderId: internalOrderId || ''
        },

        theme: {
            color: '#667eea'
        },

        handler: async function (response) {

            console.log('✅ Payment success', response);

            btn.textContent = '⏳ Verifying...';

            try {

                const vr = await fetch(WEB_APP_URL, {

                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        mode: 'verifyPayment',
                        email: data.email,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_signature: response.razorpay_signature
                    })

                });

                const verifyRes = await vr.json();

                if (verifyRes.status === 'success') {

                    document.getElementById('orderForm').style.display = 'none';
                    document.getElementById('successMsg').classList.add('show');

                } else {

                    throw new Error(verifyRes.message || 'Verification failed');

                }

            } catch (err) {

                console.error(err);
                alert('Payment received but verification failed. Contact support.');

            }

        },

        modal: {
            ondismiss: () => {

                console.log('Payment closed');
                btn.disabled = false;
                btn.textContent = originalText;

            }
        }

    });

    rzp.on('payment.failed', function (resp) {

        console.error('❌ Payment failed:', resp.error);
        alert('Payment failed: ' + resp.error.description);

        btn.disabled = false;
        btn.textContent = originalText;

    });

    rzp.open();

}


// ============================================================
// EDIT MODE SAVE
// ============================================================

async function handleEdit(btn) {

    const fd = new FormData(document.getElementById('orderForm'));

    const data = {
        mode: 'edit',
        email: currentEmail,
        editToken: currentToken
    };

    fd.forEach((v, k) => {
        if (k !== 'email') data[k] = v;
    });

    const phone = getFullPhone('phoneCC', 'phoneNumber');
    const wa = getFullPhone('whatsappCC', 'whatsappNumber');

    if (phone) data.phone = phone;
    if (wa) data.whatsapp = wa;

    delete data.phoneCC;
    delete data.phoneNumber;
    delete data.whatsappCC;
    delete data.whatsappNumber;

    btn.disabled = true;
    btn.textContent = '⏳ Saving...';

    const r = await fetch(WEB_APP_URL, {

        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data)

    });

    const res = await r.json();

    if (res.status === 'success') {

        document.getElementById('orderForm').style.display = 'none';
        document.getElementById('editSuccessMsg').classList.add('show');

    } else {

        throw new Error(res.message);

    }

}


// ============================================================
// PHONE HELPERS
// ============================================================

function getFullPhone(ccId, numId) {

    const cc = String(document.getElementById(ccId)?.value || '91').replace(/\D/g, '');
    const num = String(document.getElementById(numId)?.value || '').replace(/\D/g, '');

    if (!num) return '';
    return cc + num;

}

function prefillPhone(stored, ccId, numId) {

    const digits = String(stored || '').replace(/\D/g, '');

    if (!digits) return;

    const ccEl = document.getElementById(ccId);
    const numEl = document.getElementById(numId);

    if (!ccEl || !numEl) return;

    const options = Array.from(ccEl.options).map(o => o.value);

    for (let cc of options) {

        if (digits.startsWith(cc)) {

            ccEl.value = cc;
            numEl.value = digits.slice(cc.length);
            return;

        }

    }

    numEl.value = digits;

}


// ============================================================
// DIGIT ONLY INPUT
// ============================================================

['phoneNumber', 'whatsappNumber', 'contact2PhoneNumber'].forEach(id => {

    const el = document.getElementById(id);

    if (el) {

        el.addEventListener('input', function () {
            this.value = this.value.replace(/\D/g, '');
        });

    }

});

</script>
