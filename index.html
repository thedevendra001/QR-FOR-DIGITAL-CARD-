<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Visiting Card - ₹499</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- ✅ Load Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 40px 24px; text-align: center; color: white; }
        .price-tag { display: inline-block; background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; padding: 16px 40px; border-radius: 50px; font-size: 48px; font-weight: 900; margin: 16px 0; box-shadow: 0 8px 24px rgba(255,215,0,0.4); }
        .form-section { padding: 28px 24px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        .form-group input { width: 100%; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.1); }
        .submit-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 28px; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .status-box { padding: 20px; border-radius: 12px; margin: 20px 0; text-align: center; display: none; }
        .status-box.show { display: block; }
        .status-box.processing { background: #fff3cd; border: 2px solid #ffc107; }
        .status-box.success { background: #d1fae5; border: 2px solid #10b981; }
        .status-box.error { background: #fee; border: 2px solid #ef4444; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Professional Digital Visiting Card</h1>
        <div class="price-tag">₹499</div>
        <p style="font-size:14px;opacity:0.9;margin-top:16px">One-Time • Lifetime Access</p>
    </div>
    
    <div class="form-section">
        <form id="orderForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" name="fullName" required>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" id="emailField" required>
            </div>
            <div class="form-group">
                <label>Phone *</label>
                <input type="tel" name="phone" required maxlength="10">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">💳 Pay ₹499</button>
        </form>

        <!-- Processing Status -->
        <div class="status-box processing" id="processingBox">
            <div class="spinner"></div>
            <h3 id="processingMsg">Processing payment...</h3>
            <p style="margin-top:10px;font-size:14px;color:#856404" id="processingDetail"></p>
        </div>

        <!-- Success -->
        <div class="status-box success" id="successBox">
            <h2 style="color:#065f46;margin-bottom:10px">🎉 Card Activated!</h2>
            <p style="color:#047857;margin-bottom:20px">Check your email for card URL and QR code</p>
            <a href="#" id="cardLink" style="display:inline-block;background:#667eea;color:white;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:600">📱 View Card</a>
        </div>

        <!-- Error -->
        <div class="status-box error" id="errorBox">
            <h3 style="color:#991b1b;margin-bottom:10px">❌ Error</h3>
            <p style="color:#7f1d1d" id="errorMsg"></p>
        </div>
    </div>
</div>

<script>
// ============================================================
// ⚠️ UPDATE THIS URL AFTER DEPLOYMENT
// ============================================================
const WEB_APP_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
const RAZORPAY_KEY_ID = 'rzp_live_SGoMjcZYfpwxeX';

let currentEmail = null;
let pollInterval = null;

console.log('🚀 Loaded | Razorpay:', typeof Razorpay !== 'undefined' ? '✅' : '❌');

// ============================================================
// FORM SUBMIT
// ============================================================
document.getElementById('orderForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('submitBtn');
    const form = e.target;
    
    // Collect data
    const formData = new FormData(form);
    const data = {};
    formData.forEach((v, k) => { data[k] = v; });
    
    // Validate
    if (!data.fullName || !data.email || !data.phone) {
        alert('All fields required');
        return;
    }
    if (data.phone.replace(/\D/g, '').length !== 10) {
        alert('Phone must be 10 digits');
        return;
    }
    
    currentEmail = data.email.trim().toLowerCase();
    
    try {
        btn.disabled = true;
        btn.textContent = '⏳ Creating order...';
        
        console.log('📤 Creating order...');
        
        // Create order
        const res = await fetch(WEB_APP_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ mode: 'create', ...data })
        });
        
        const result = await res.json();
        console.log('📦 Order result:', result);
        
        if (result.status !== 'success') {
            throw new Error(result.message || 'Order creation failed');
        }
        
        console.log('✅ Order created:', result.orderId);
        
        // Open Razorpay
        btn.textContent = '💳 Opening payment...';
        await new Promise(r => setTimeout(r, 500));
        
        if (typeof Razorpay === 'undefined') {
            throw new Error('Razorpay not loaded');
        }
        
        openRazorpay(data, result.orderId, result.email);
        
    } catch (err) {
        console.error('❌ Error:', err);
        showError(err.message);
        btn.disabled = false;
        btn.textContent = '💳 Pay ₹499';
    }
});

// ============================================================
// OPEN RAZORPAY PAYMENT
// ============================================================
function openRazorpay(data, orderId, email) {
    const rzp = new Razorpay({
        key: RAZORPAY_KEY_ID,
        amount: 49900,
        currency: 'INR',
        name: 'Agrawal Futurify AI Solutions',
        description: 'Digital Visiting Card',
        prefill: {
            name: data.fullName,
            email: email,
            contact: data.phone
        },
        notes: {
            orderId: orderId,
            email: email  // ✅ CRITICAL for webhook
        },
        theme: { color: '#667eea' },
        
        // ============================================================
        // PAYMENT SUCCESS HANDLER
        // ============================================================
        handler: async function(response) {
            console.log('✅ Payment success:', response.razorpay_payment_id);
            
            hideForm();
            showProcessing('Verifying payment...', 'Please wait, this may take a few seconds');
            
            try {
                // ✅ PATH B: Frontend verification (secondary)
                console.log('📤 Sending verification...');
                
                const verifyRes = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        mode: 'verify',
                        email: currentEmail,
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_order_id: response.razorpay_order_id || '',
                        razorpay_signature: response.razorpay_signature || ''
                    })
                });
                
                const verifyResult = await verifyRes.json();
                console.log('📦 Verify result:', verifyResult);
                
                if (verifyResult.status === 'success') {
                    console.log('🎉 Verification successful!');
                    showSuccess(verifyResult.cardUrl);
                } else {
                    throw new Error(verifyResult.message || 'Verification failed');
                }
                
            } catch (err) {
                console.error('❌ Verification error:', err);
                
                // ✅ PATH C: Start polling (tertiary fallback)
                console.log('🔄 Starting status polling...');
                showProcessing('Activating your card...', 'Payment received. Activating card automatically...');
                startPolling();
            }
        },
        
        // ============================================================
        // PAYMENT CANCELLED
        // ============================================================
        modal: {
            ondismiss: function() {
                console.log('Payment cancelled');
                
                // Start polling in case payment actually went through
                showProcessing('Checking payment status...', 'Verifying if payment was completed...');
                startPolling();
                
                // Stop after 15 seconds if no payment found
                setTimeout(() => {
                    if (pollInterval) {
                        stopPolling();
                        showError('Payment cancelled. You can retry anytime.');
                    }
                }, 15000);
            }
        }
    });
    
    rzp.on('payment.failed', function(response) {
        console.error('Payment failed:', response.error);
        showError('Payment failed: ' + response.error.description);
    });
    
    console.log('🚀 Opening Razorpay...');
    rzp.open();
}

// ============================================================
// STATUS POLLING SYSTEM (PATH C - TERTIARY FALLBACK)
// Checks backend every 3 seconds for up to 2 minutes
// ============================================================
function startPolling() {
    if (!currentEmail) {
        console.error('No email to poll');
        return;
    }
    
    let attempts = 0;
    const maxAttempts = 40; // 2 minutes (40 × 3 seconds)
    
    console.log('🔄 Starting polling for:', currentEmail);
    
    pollInterval = setInterval(async () => {
        attempts++;
        console.log(`🔍 Poll attempt ${attempts}/${maxAttempts}`);
        
        try {
            const res = await fetch(`${WEB_APP_URL}?mode=checkStatus&email=${encodeURIComponent(currentEmail)}`);
            const result = await res.json();
            
            console.log('📦 Status:', result);
            
            if (result.status === 'success' && result.activated) {
                console.log('🎉 Card activated!');
                stopPolling();
                showSuccess(result.cardUrl);
                return;
            }
            
            if (attempts >= maxAttempts) {
                console.log('⏱️ Polling timeout');
                stopPolling();
                showProcessing(
                    'Payment processing...',
                    'Your payment is being processed. You will receive an email when your card is ready. This usually takes 2-5 minutes.'
                );
            }
            
        } catch (err) {
            console.error('Poll error:', err);
            
            if (attempts >= maxAttempts) {
                stopPolling();
                showError('Could not verify payment status. Check your email for updates.');
            }
        }
    }, 3000); // Poll every 3 seconds
}

function stopPolling() {
    if (pollInterval) {
        clearInterval(pollInterval);
        pollInterval = null;
        console.log('🛑 Stopped polling');
    }
}

// ============================================================
// UI STATE FUNCTIONS
// ============================================================
function hideForm() {
    document.getElementById('orderForm').style.display = 'none';
}

function showProcessing(title, detail) {
    document.getElementById('processingMsg').textContent = title;
    document.getElementById('processingDetail').textContent = detail || '';
    document.getElementById('processingBox').classList.add('show');
    document.getElementById('successBox').classList.remove('show');
    document.getElementById('errorBox').classList.remove('show');
}

function showSuccess(cardUrl) {
    stopPolling();
    document.getElementById('cardLink').href = cardUrl || '#';
    document.getElementById('successBox').classList.add('show');
    document.getElementById('processingBox').classList.remove('show');
    document.getElementById('errorBox').classList.remove('show');
}

function showError(message) {
    stopPolling();
    document.getElementById('errorMsg').textContent = message;
    document.getElementById('errorBox').classList.add('show');
    document.getElementById('processingBox').classList.remove('show');
    document.getElementById('successBox').classList.remove('show');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = '💳 Pay ₹499';
}

// Phone validation
document.querySelector('[name="phone"]').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').substring(0, 10);
});
</script>
</body>
</html>
